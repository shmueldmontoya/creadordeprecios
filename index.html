<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Generador de Rótulos</title>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script src="https://kit.fontawesome.com/2bcc83cc55.js" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/fondo.css">
  <script defer src="js/main.js"></script>
</head>
<body>
  <header>
    <h1>Generador de Rótulos</h1>
  </header>
  <div class="formulario">
    <div class="campo-input">
  <i class="fas fa-barcode"></i>
  <input type="number" id="codigo" autocomplete="off"/>
  <label for="codigo">Código</label>
</div>

<div class="campo-input">
  <i class="fas fa-box"></i>
  <input type="text" id="producto" autocomplete="off"/>
  <label for="producto">Producto</label>
</div>

<div class="campo-input">
  <i class="fas fa-times-circle"></i>
  <input type="number" id="promo" autocomplete="off" />
  <label for="promo">Promoción x cantidad (si aplica)</label>
</div>

<div class="campo-input">
  <i class="fas fa-dollar-sign"></i>
  <input type="number" id="actual" autocomplete="off"/>
  <label for="actual">Precio actual</label>
</div>

<div class="campo-input">
  <i class="fas fa-tag"></i>
  <input type="number" id="anterior" autocomplete="off"/>
  <label for="anterior">Precio anterior</label>
</div>

<div class="campo-radio">
  <span>Unidad de medida:</span>
  <label><input type="radio" name="tipoVenta" value="kg" /> Kilogramo</label>
  <label><input type="radio" name="tipoVenta" value="ud" /> Unidad</label>
  <label><input type="radio" name="tipoVenta" value="" checked /> No indicar</label>
</div>


    <div class="botones-formulario">
      <button id="botonDescargarRotulo" class="botonDescargarRotulo ripple">Descargar imagen</button>
    </div>
  </div>

  <div class="previsualizacion">
    <div class="rotulo" id="rotulo">
      <div class="producto" id="texto-producto"></div>
      <div class="precio-actual" id="texto-actual"></div>
      <div class="antes" id="texto-anterior"></div>
      <div class="ahorre" id="texto-ahorre"></div>
    </div>
  </div>
</body>
</html>
